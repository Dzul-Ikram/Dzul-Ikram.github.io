<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner HTML</title>
    <script>
        function myFunction() {
            document.getElementById("demo").innerHTML = "Belajar Javascript.";
        }
    </script>
</head>
<body>
    <h1 id="demo"></h1>
    <button type="button" onclick="myFunction()">Klik</button>
</body>
</html>
