<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tugas 04 - Register</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        margin: 0;
        padding: 20px;
    }

    .wrapper {
        width: 600px;
        margin: 40px auto;
    }

    h1.title {
        text-align: center;
        color: #999999;
        font-size: 36px;
        font-weight: normal;
        margin-bottom: 20px;
    }

    .form-container {
        background-color: #cccccc; 
        padding: 40px;
        box-sizing: border-box;
    }

    .kolom-3 {
        float: left;
        width: 32%;
        margin-right: 2%; 
        box-sizing: border-box;
    }

    .kolom-3.terakhir {
        margin-right: 0;
    }

    input[type="text"], input[type="email"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        box-sizing: border-box;
        background-color: transparent; 
        border: 1px solid #eaeaea; 
        color: white; 
        font-size: 14px;
    }

    input::placeholder {
        color: white;
        opacity: 0.9;
    }

    input[type="submit"] {
        width: 100%;
        padding: 15px;
        background-color: #2b579a; 
        color: white;
        border: none;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 1px;
        margin-top: 10px;
        cursor: pointer;
    }

    .footer-text {
        text-align: center;
        color: white;
        margin-top: 25px;
        font-size: 14px;
        line-height: 1.6;
    }

    .footer-text a {
        color: white; 
        text-decoration: none; 
    }

    .footer-text a:hover {
        text-decoration: underline;
    }

    .clearfix:after {
        content: ".";
        display: block;
        height: 0;
        clear: both;
        visibility: hidden;
    }
</style>
</head>
<body>

<div class="wrapper">
    <h1 class="title">Register</h1>

    <div class="form-container">
        <form>
            <div class="clearfix">
                <div class="kolom-3">
                    <input type="text" placeholder="Firstname">
                </div>
                <div class="kolom-3">
                    <input type="text" placeholder="Middlename">
                </div>
                <div class="kolom-3 terakhir">
                    <input type="text" placeholder="Lastname">
                </div>
            </div>

            <input type="text" placeholder="Username (alphanumeric min 6 chars)">

            <input type="email" placeholder="Email">

            <input type="submit" value="SIGNUP">

            <div class="footer-text">
                Have already an account? <a href="#">Login Now!</a><br>
                Forgot your password? <a href="#">Click Here!</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
