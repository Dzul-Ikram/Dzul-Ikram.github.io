<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <script>
        var pilihan = prompt("Masukkan pilihan (1-3).","")
        switch(pilihan)
        {
            case "1":
                {
                    document.write("Ini pilihan no satu");
                    break;
                }
            case "2":
                {
                    document.write("Ini pilihan no dua");
                    break;
                }
            case "3":
                {
                    document.write("Ini pilihan no tiga");
                    break;
                }    
            default :
            {
                document.write("pilihan tidak tersedia");
            }    
        }
    </script>
</body>
</html>
