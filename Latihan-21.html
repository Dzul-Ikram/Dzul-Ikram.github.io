<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleksi kondisi</title>
</head>
<body>
    <script>
        var nilai = prompt("masukkan Nilai (0 .. 100): ", 0)
        var hasil = "";
        if(nilai >= 70)
        {
            hasil = "Lulus";
        } else
            {
                hasil = "Mengulang";
            }

    document.write("Hasil dari nilai anda : " + hasil);
    </script>
</body>
</html>
