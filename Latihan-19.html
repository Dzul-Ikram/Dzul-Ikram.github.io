<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Confirmation</title>
    <script>
        function confirmation()
        {
            var yakin = confirm("Apakah kamu yakin?");
            if (yakin) {
                document.write("Ya, Saya Yakin");
            } else {
                document.write("Saya Tidak Yakin :");
            }
        }
    </script>
</head>
<body>
    <button onclick="confirmation()">Konfirmasi</button>
</body>
</html>
