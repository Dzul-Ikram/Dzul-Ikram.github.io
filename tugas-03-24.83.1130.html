<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tugas 03 - Daftar</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        margin: 0;
        padding: 20px;
    }
    
    .wrapper {
        width: 800px; 
        margin: 50px auto; 
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .kolom-gambar {
        float: left;
        width: 50%; 
        box-sizing: border-box;
    }

    .kolom-gambar img {
        width: 100%; 
        height: 100%;
        border-top-left-radius: 10px;
        border-bottom-left-radius: 10px;
        object-fit: cover;
    }

    .kolom-form {
        float: left;
        width: 50%; 
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
    }

    h2 {
        color: #00bcd4;
        margin-bottom: 20px;
    }

    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        box-sizing: border-box;
        border: 1px solid #e0e0e0;
        border-radius: 5px;
        background-color: #f9f9f9;
        font-size: 14px;
    }

    .checkbox-group {
        text-align: left;
        font-size: 12px;
        color: #999;
        margin-bottom: 20px;
    }

    .checkbox-group a {
        color: #00bcd4;
        text-decoration: none;
    }

    input[type="submit"] {
        width: 120px;
        padding: 10px;
        background-color: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 5px;
        color: #aaa;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .clearfix:after {
        content: ".";
        display: block;
        height: 0;
        clear: both;
        visibility: hidden;
    }

    .btn-sosial {
        width: 48%;
        padding: 10px;
        border-radius: 5px;
        font-weight: bold;
        border: 1px solid #ddd;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none; 
        font-size: 14px;
    }

    .btn-sosial img {
        width: 18px;
        height: 18px;
        margin-right: 8px; 
    }

    .btn-fb {
        float: left;
        background-color: #3b5998;
        color: white;
        border: none;
    }

    .btn-google {
        float: right;
        background-color: #ffffff;
        color: #555;
    }

    .footer {
        margin-top: 30px;
        font-size: 14px;
        color: #666;
        clear: both;
    }

    .footer a {
        color: #00bcd4;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="wrapper clearfix">
    
    <div class="kolom-gambar">
        <img src="d:\pemrograman web\gambar_mahasiswa.jpeg" alt="[Gambar Mahasiswa Amikom]">
    </div>

    <div class="kolom-form">
        <h2>Daftar di Amikom</h2>

        <form>
            <input type="text" placeholder="Nama lengkap"><br>
            <input type="text" placeholder="Email/nomor HP"><br>
            <input type="password" placeholder="Kata sandi"><br>

            <div class="checkbox-group">
                <input type="checkbox" id="syarat">
                <label for="syarat">Dengan mencentang ini, kamu menyetujui <a href="#">Syarat & Ketentuan</a> kami.</label>
            </div>

            <input type="submit" value="Daftar"><br>

            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

            <div class="clearfix">
 
                <a href="#" class="btn-sosial btn-fb">
                    <img src="d:\pemrograman web\Facebook.png" alt="[Logo Facebook]"> Facebook
                </a>
                
                <a href="#" class="btn-sosial btn-google">
                    <img src="d:\pemrograman web\google-logo.png" alt="[Logo Google]"> Google
                </a>
            </div>

            <div class="footer">
                <p>Sudah terdaftar <a href="#">Masuk</a></p>
            </div>
        </form>
    </div>

</div>

</body>
</html>
